spring.application.name=codepocalypse-agent
server.port=8080

# Anthropic Claude
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-20250514
spring.ai.anthropic.chat.options.temperature=0.7

# Chat Memory - JDBC backed with H2
spring.ai.chat.memory.repository.jdbc.initialize-schema=always
spring.datasource.url=jdbc:h2:file:./data/agent-memory
spring.datasource.driver-class-name=org.h2.Driver

# MCP - Developer Events server (conference CFPs)
spring.ai.mcp.client.stdio.servers.events.command=developer-events-mcp
