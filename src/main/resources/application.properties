spring.application.name=codepocalypse-agent
server.port=8080

# Anthropic Claude
spring.ai.anthropic.api-key=${ANTHROPIC_API_KEY}
spring.ai.anthropic.chat.options.model=claude-sonnet-4-20250514
spring.ai.anthropic.chat.options.temperature=0.7


# MCP starter disabled for now (structuredContent not passed to model in 2.0-M4)
# Conference tools use direct HTTP instead - see ConferenceTools.java
spring.ai.mcp.client.enabled=false

# Advisor debug logging
logging.level.org.springframework.ai.chat.client.advisor=DEBUG

# Spring AI observation logging
spring.ai.chat.observations.include-prompt=true
spring.ai.chat.observations.include-completion=true
spring.ai.tool.observations.include-content=true

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
